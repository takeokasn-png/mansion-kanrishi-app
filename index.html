<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="管理士試験">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>マンション管理士 一問一答</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1a237e;--accent:#ff6f00;--green:#2e7d32;--red:#c62828;--orange:#e65100;
  --card:#fff;--bg:#f0f2f5;--text:#1a1a2e;--sub:#666;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* ===== HOME ===== */
#homeScreen{background:linear-gradient(160deg,#1a237e 0%,#283593 60%,#1565c0 100%);}
.home-header{padding:calc(var(--safe-top) + 14px) 20px 14px;text-align:center;color:#fff;position:relative;}
.home-header h1{font-size:20px;font-weight:700;letter-spacing:1px;margin-bottom:2px;}
.home-header p{font-size:12px;opacity:.75;}
.total-badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;padding:3px 12px;font-size:11px;margin-top:6px;}
.exam-countdown{margin-top:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:12px;padding:7px 14px;font-size:12px;color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
.exam-countdown .exam-date{opacity:.85;}
.exam-countdown .days-wrap{display:flex;align-items:baseline;gap:3px;}
.exam-countdown .days{font-size:26px;font-weight:bold;color:#FFD54F;line-height:1;}
.exam-countdown .days-unit{font-size:12px;color:#FFD54F;}
.edit-btn{position:absolute;top:calc(var(--safe-top) + 16px);right:16px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;}
.edit-done-btn{display:none;position:absolute;top:calc(var(--safe-top) + 16px);right:16px;background:#ffd54f;border:none;color:#1a237e;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;}
.genre-grid{padding:12px 16px 12px;display:flex;flex-direction:column;gap:12px;}
.pass-stats{margin:0 16px;padding:14px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:14px;color:#fff;margin-bottom:calc(var(--safe-bottom)+90px);}
.pass-stats-title{font-size:11px;opacity:.7;margin-bottom:8px;text-align:center;}
.pass-stats-table{width:100%;border-collapse:collapse;font-size:12px;}
.pass-stats-table th{opacity:.6;font-weight:400;padding:3px 6px;text-align:center;}
.pass-stats-table td{padding:4px 6px;text-align:center;border-top:1px solid rgba(255,255,255,.1);}
.pass-stats-table .pct{font-weight:700;color:#FFD54F;}
.home-footer-space{height:1cm;}
.genre-card{background:#fff;border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.12);cursor:pointer;transition:transform .1s,opacity .2s;}
.genre-card:active{transform:scale(.97);}
.genre-card.dragging{opacity:.4;transform:scale(.97);}
.genre-card.drag-over{border:2px dashed #1a237e;}
.drag-handle{display:none;color:#bbb;font-size:22px;cursor:grab;padding:0 4px;flex-shrink:0;touch-action:none;}
.edit-mode .drag-handle{display:flex;align-items:center;}
.edit-mode .genre-card{cursor:default;}
.edit-mode .genre-card:active{transform:none;}
.genre-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.genre-info{flex:1;min-width:0;}
.genre-name{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:3px;}
.genre-meta{font-size:12px;color:#888;}
.genre-progress{width:100%;height:4px;background:#e8eaf6;border-radius:2px;margin-top:8px;overflow:hidden;}
.genre-progress-bar{height:100%;border-radius:2px;transition:width .4s;}
.genre-score{font-size:12px;font-weight:700;margin-left:auto;flex-shrink:0;text-align:center;}
.genre-score-label{font-size:9px;font-weight:400;color:#999;display:block;margin-bottom:1px;}

/* ===== QUIZ ===== */
#quizScreen{background:var(--bg);}
.quiz-header{background:var(--primary);color:#fff;padding:calc(var(--safe-top)+12px) 16px 12px;display:flex;align-items:center;gap:10px;}
.back-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:10px;padding:8px 14px;font-size:14px;cursor:pointer;}
.quiz-title{font-size:15px;font-weight:700;flex:1;text-align:center;}
.quiz-counter{font-size:13px;opacity:.8;}
.progress-bar-wrap{background:#3949ab;height:4px;}
.progress-bar-inner{height:100%;background:#ffd54f;transition:width .3s;}
.quiz-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 16px calc(var(--safe-bottom)+20px);gap:16px;}
.question-num{font-size:12px;color:var(--sub);font-weight:600;}
.question-card{background:#fff;border-radius:20px;padding:28px 22px;box-shadow:0 4px 20px rgba(0,0,0,.1);width:100%;max-width:500px;}
.question-text{font-size:17px;line-height:1.7;font-weight:500;color:var(--text);}
.answer-btns{display:flex;gap:14px;width:100%;max-width:500px;}
.ans-btn{flex:1;padding:18px;border:none;border-radius:16px;font-size:26px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .2s;box-shadow:0 4px 14px rgba(0,0,0,.15);}
.ans-btn:active{transform:scale(.95);}
.ans-btn.maru{background:var(--green);color:#fff;}
.ans-btn.batsu{background:var(--red);color:#fff;}

/* 結果オーバーレイ */
.result-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center;padding:0 0 calc(var(--safe-bottom)+20px);overflow-y:auto;}
.result-overlay.show{display:flex;}
.result-card{background:#fff;border-radius:28px 28px 24px 24px;padding:24px 20px 20px;width:100%;max-width:500px;box-shadow:0 -8px 40px rgba(0,0,0,.2);}
.result-header{text-align:center;margin-bottom:12px;}
.result-badge{display:inline-block;border-radius:12px;padding:8px 24px;font-size:20px;font-weight:700;margin-bottom:8px;}
.result-badge.correct{background:#e8f5e9;color:var(--green);}
.result-badge.wrong{background:#ffebee;color:var(--red);}
.result-explanation{font-size:14px;line-height:1.7;color:#333;background:#f5f5f5;border-radius:12px;padding:14px;margin-bottom:12px;}
.result-answer-text{font-size:13px;color:var(--sub);text-align:center;margin-bottom:10px;}

/* 復習チェックボタン */
.review-check-btn{width:100%;padding:13px;border:2px solid #e0e0e0;border-radius:12px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;transition:all .15s;color:#555;}
.review-check-btn.checked{background:#fff3e0;border-color:var(--orange);color:var(--orange);}

.next-btn{width:100%;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;}

/* ===== RESULT SCREEN ===== */
#resultScreen{background:linear-gradient(160deg,#1a237e,#283593);}
.result-screen-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--safe-top)+20px) 20px calc(var(--safe-bottom)+20px);gap:20px;}
.result-circle{width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.1);border:4px solid #ffd54f;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
.result-pct{font-size:48px;font-weight:700;}
.result-label{font-size:14px;opacity:.8;}
.result-genre-name{font-size:18px;font-weight:700;color:#fff;text-align:center;}
.result-stats{display:flex;gap:16px;}
.stat-box{background:rgba(255,255,255,.12);border-radius:16px;padding:16px 24px;text-align:center;color:#fff;}
.stat-num{font-size:28px;font-weight:700;}
.stat-lbl{font-size:12px;opacity:.7;}
.result-btns{display:flex;flex-direction:column;gap:10px;width:100%;}
.result-btns button{padding:16px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-retry{background:#ffd54f;color:#1a237e;}
.btn-home{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)!important;}

/* ===== WRONG / REVIEW LIST ===== */
#wrongScreen,#reviewScreen{background:var(--bg);}
.list-header{background:var(--primary);color:#fff;padding:calc(var(--safe-top)+12px) 16px 12px;display:flex;align-items:center;gap:10px;}
.item-list{padding:16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;padding-bottom:calc(var(--safe-bottom)+20px);}
.list-item{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.list-item-q{font-size:14px;line-height:1.6;margin-bottom:8px;}
.list-item-a{font-size:13px;color:var(--primary);font-weight:600;}
.list-item-e{font-size:12px;color:var(--sub);margin-top:4px;line-height:1.5;}
.review-del-btn{float:right;background:none;border:1px solid #ccc;border-radius:8px;padding:4px 10px;font-size:12px;color:#888;cursor:pointer;margin-left:8px;}

/* 復習画面のスタート */
.review-start-bar{padding:12px 16px;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;}
.review-count{font-size:13px;color:var(--sub);}
.review-start-btn{background:var(--orange);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;}

/* ===== 4択ボタン ===== */
.choice-btn{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:14px;background:#fff;font-size:14px;line-height:1.5;text-align:left;cursor:pointer;transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.choice-btn:active{transform:scale(.98);}
.choice-btn.correct{background:#e8f5e9;border-color:var(--green);color:var(--green);}
.choice-btn.wrong{background:#ffebee;border-color:var(--red);color:var(--red);}
.choice-btn:disabled{cursor:default;}

/* ===== BOTTOM NAV ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:flex;padding-bottom:var(--safe-bottom);z-index:50;box-shadow:0 -2px 10px rgba(0,0,0,.08);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 6px;cursor:pointer;border:none;background:none;color:#9e9e9e;font-size:9px;gap:3px;transition:color .15s;position:relative;}
.nav-btn.active{color:var(--primary);}
.nav-btn svg{width:22px;height:22px;}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--orange);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;}

/* ===== SEARCH ===== */
.search-bar{padding:10px 16px 4px;position:relative;}
.search-input{width:100%;padding:10px 40px 10px 14px;border-radius:12px;border:none;font-size:14px;background:rgba(255,255,255,.18);color:#fff;outline:none;}
.search-input::placeholder{color:rgba(255,255,255,.5);}
.search-clear{position:absolute;right:24px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;display:none;}
#searchScreen{background:var(--bg);}
.search-result-header{background:var(--primary);color:#fff;padding:calc(var(--safe-top)+12px) 16px 12px;display:flex;align-items:center;gap:10px;}
.search-result-list{padding:12px 16px calc(var(--safe-bottom)+20px);display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.search-result-item{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;}
.search-result-item:active{opacity:.7;}
.search-genre-tag{font-size:10px;font-weight:700;color:#fff;border-radius:6px;padding:2px 8px;display:inline-block;margin-bottom:6px;}
.search-result-q{font-size:13px;line-height:1.6;color:#1a1a2e;}
.search-highlight{background:#FFF59D;border-radius:2px;}
.search-empty{text-align:center;padding:60px 20px;color:#999;font-size:15px;}
</style>
</head>
<body>

<!-- HOME -->
<div id="homeScreen" class="screen active">
  <div class="home-header">
    <button class="edit-btn" id="editBtn" onclick="toggleEditMode()">編集</button>
    <button class="edit-done-btn" id="editDoneBtn" onclick="toggleEditMode()">完了</button>
    <h1>🏢 マンション管理士</h1>
    <p>過去問・一問一答 試験対策</p>
    <div class="total-badge" id="totalBadge"></div>
    <div class="exam-countdown" id="examCountdown"></div>
  </div>
  <div class="search-bar">
    <input class="search-input" id="searchInput" type="search" placeholder="🔍 キーワード検索..." oninput="onSearchInput()" oncompositionend="onSearchCompositionEnd()" onkeydown="if(event.key==='Enter'&&!_isComposing){const k=this.value.trim();if(k)doSearch(k);}" />
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="genre-grid" id="genreGrid"></div>
  <div class="pass-stats">
    <div class="pass-stats-title">📊 過去7年間の合格実績</div>
    <table class="pass-stats-table">
      <tr><th>年度</th><th>受験者数</th><th>合格者数</th><th>合格率</th></tr>
      <tr><td>R7</td><td>10,984名</td><td>1,210名</td><td class="pct">11.0%</td></tr>
      <tr><td>R6</td><td>12,489名</td><td>1,286名</td><td class="pct">10.3%</td></tr>
      <tr><td>R5</td><td>13,762名</td><td>1,125名</td><td class="pct">8.2%</td></tr>
      <tr><td>R4</td><td>12,695名</td><td>1,402名</td><td class="pct">11.0%</td></tr>
      <tr><td>R3</td><td>12,520名</td><td>1,238名</td><td class="pct">10.0%</td></tr>
      <tr><td>R2</td><td>12,198名</td><td>1,045名</td><td class="pct">8.6%</td></tr>
      <tr><td>R1</td><td>12,021名</td><td>991名</td><td class="pct">8.2%</td></tr>
    </table>
  </div>
  <div style="height:2.5cm;"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showHome()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      ホーム
    </button>
    <button class="nav-btn" onclick="showReviewScreen()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      復習問題
      <span class="nav-badge" id="reviewBadge" style="display:none"></span>
    </button>
    <button class="nav-btn" onclick="showWrongList()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      間違い一覧
    </button>
    <button class="nav-btn" onclick="resetAll()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      リセット
    </button>
  </nav>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="showHome()">＜ 戻る</button>
    <div class="quiz-title" id="quizTitle"></div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="quiz-counter" id="quizCounter"></div>
      <button class="back-btn" onclick="restartToFirst()" style="font-size:11px;padding:5px 9px;opacity:.85;">1問目</button>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-inner" id="progressBar"></div></div>
  <div class="quiz-body">
    <div class="question-num" id="questionNum"></div>
    <div class="question-card"><div class="question-text" id="questionText"></div></div>
    <div class="answer-btns" id="answerBtns">
      <button class="ans-btn maru" onclick="answer(true)">○</button>
      <button class="ans-btn batsu" onclick="answer(false)">×</button>
    </div>
    <div class="choice-btns" id="choiceBtns" style="display:none;flex-direction:column;gap:10px;width:100%;max-width:500px;"></div>
  </div>
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div class="result-header">
        <div class="result-badge" id="resultBadge"></div>
        <div class="result-answer-text" id="resultAnswerText"></div>
      </div>
      <div class="result-explanation" id="resultExplanation"></div>
      <button class="review-check-btn" id="reviewCheckBtn" onclick="toggleReview()">☆ 復習リストに追加</button>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <div class="result-screen-body">
    <div class="result-genre-name" id="finalGenreName"></div>
    <div class="result-circle">
      <div class="result-pct" id="finalPct"></div>
      <div class="result-label">正解率</div>
    </div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-num" id="finalCorrect"></div><div class="stat-lbl">正解</div></div>
      <div class="stat-box"><div class="stat-num" id="finalWrong"></div><div class="stat-lbl">不正解</div></div>
      <div class="stat-box"><div class="stat-num" id="finalTotal"></div><div class="stat-lbl">出題数</div></div>
    </div>
    <div class="result-btns">
      <button class="btn-retry" onclick="retryQuiz()">もう一度挑戦</button>
      <button class="btn-home" onclick="showHome()">ジャンル選択に戻る</button>
    </div>
  </div>
</div>

<!-- SEARCH RESULT -->
<div id="searchScreen" class="screen">
  <div class="search-result-header">
    <button class="back-btn" onclick="showHome()">＜ 戻る</button>
    <div class="quiz-title" id="searchResultTitle">検索結果</div>
  </div>
  <div class="search-result-list" id="searchResultList"></div>
</div>

<!-- WRONG LIST -->
<div id="wrongScreen" class="screen">
  <div class="list-header">
    <button class="back-btn" onclick="showHome()">＜ 戻る</button>
    <div class="quiz-title">間違えた問題</div>
  </div>
  <div class="item-list" id="wrongList"></div>
</div>

<!-- REVIEW SCREEN -->
<div id="reviewScreen" class="screen">
  <div class="list-header">
    <button class="back-btn" onclick="showHome()">＜ 戻る</button>
    <div class="quiz-title">復習問題</div>
  </div>
  <div class="review-start-bar">
    <div class="review-count" id="reviewCount"></div>
    <button class="review-start-btn" id="reviewStartBtn" onclick="startReviewQuiz()">まとめて解く →</button>
  </div>
  <div class="item-list" id="reviewList"></div>
</div>

<script src="questions.js"></script>
<script>
const STORAGE_KEY = 'mgr_stats_v2';
let state = loadState();
let currentGenreIdx = 0;
let currentQuestions = [];
let currentQIdx = 0;
let sessionCorrect = 0;
let sessionWrong = 0;
let isReviewMode = false;

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function genKey(gid, qi) { return `${gid}_${qi}`; }
function reviewKey(gid, qi) { return `rev_${gid}_${qi}`; }

function getReviewList() {
  return state._review || {};
}

function updateReviewBadge() {
  const count = Object.keys(getReviewList()).length;
  const badge = document.getElementById('reviewBadge');
  if(count > 0) {
    badge.textContent = count;
    badge.style.display = 'block';
  } else {
    badge.style.display = 'none';
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let _isComposing = false;
document.addEventListener('compositionstart', () => _isComposing = true);
document.addEventListener('compositionend', () => { _isComposing = false; });

function onSearchInput() {
  const kw = document.getElementById('searchInput').value.trim();
  document.getElementById('searchClear').style.display = kw ? 'block' : 'none';
}

function onSearchCompositionEnd() {
  const kw = document.getElementById('searchInput').value.trim();
  if(kw.length < 1) return;
  doSearch(kw);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
}

function doSearch(kw) {
  const lower = kw.toLowerCase();
  const results = [];
  GENRES.forEach((g, gi) => {
    g.questions.forEach((q, qi) => {
      const haystack = (q.q + ' ' + (q.e||'') + ' ' + (q.explanation||'') + ' ' +
        Object.values(q.choices||{}).join(' ')).toLowerCase();
      if(haystack.includes(lower)) {
        results.push({g, gi, q, qi});
      }
    });
  });

  document.getElementById('searchResultTitle').textContent = `"${kw}" — ${results.length}件`;
  const list = document.getElementById('searchResultList');
  list.innerHTML = '';

  if(results.length === 0) {
    list.innerHTML = '<div class="search-empty">該当する問題が見つかりませんでした</div>';
  } else {
    results.forEach(({g, gi, q, qi}) => {
      const item = document.createElement('div');
      item.className = 'search-result-item';
      const preview = q.q.replace(new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
        '<span class="search-highlight">$1</span>');
      item.innerHTML = `<span class="search-genre-tag" style="background:${g.color}">${g.name}</span>
        <div class="search-result-q">${preview}</div>`;
      item.onclick = () => startQuizFromSearch(gi, qi);
      list.appendChild(item);
    });
  }
  showScreen('searchScreen');
}

function startQuizFromSearch(genreIdx, qIdx) {
  isReviewMode = false;
  currentGenreIdx = genreIdx;
  const g = GENRES[genreIdx];
  currentQuestions = g.questions.map((q,i) => ({...q, origIdx: i}));
  currentQIdx = qIdx;
  sessionCorrect = 0;
  sessionWrong = 0;
  document.getElementById('quizTitle').textContent = g.name;
  showScreen('quizScreen');
  renderQuestion();
}

function updateCountdown() {
  const exam = new Date('2026-11-29');
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.ceil((exam - today) / 86400000);
  const el = document.getElementById('examCountdown');
  if(!el) return;
  if(diff > 0) {
    el.innerHTML = `<span class="exam-date">試験日：2026年11月29日（日）</span><span class="days-wrap">あと <span class="days">${diff}</span><span class="days-unit">日</span></span>`;
  } else if(diff === 0) {
    el.innerHTML = `<span class="exam-date">試験日：2026年11月29日（日）</span><span class="days" style="font-size:16px">本日試験日！</span>`;
  } else {
    el.innerHTML = `<span class="exam-date">試験日：2026年11月29日（日）</span><span>試験終了</span>`;
  }
}

function updateTotalBadge() {
  const kakomenYears = GENRES.filter(g => g.type === '4choice' && g.id.match(/^r\d+_kakomon$/)).length;
  const oxCount = GENRES.filter(g => g.type !== '4choice').reduce((s,g) => s + g.questions.length, 0);
  document.getElementById('totalBadge').textContent = `4択50問${kakomenYears}年分＋○×${oxCount}問`;
}

function showHome() {
  saveSession();
  renderGenreGrid();
  updateReviewBadge();
  updateCountdown();
  updateTotalBadge();
  showScreen('homeScreen');
}

function renderGenreGrid() {
  const grid = document.getElementById('genreGrid');
  grid.innerHTML = '';
  if(isEditMode) grid.classList.add('edit-mode');
  else grid.classList.remove('edit-mode');

  const icons = ['R7','R6','R5','R4','R3','🆕','📋','📖','🏛️','⚖️','🏗️','📜'];
  const ordered = getOrderedGenres();

  ordered.forEach((g, orderIdx) => {
    const realIdx = genreOrder[orderIdx];
    const total = g.questions.length;
    const answered = g.questions.filter((_, qi) => state[genKey(g.id, qi)] !== undefined).length;
    const correct = g.questions.filter((_, qi) => state[genKey(g.id, qi)] === true).length;
    const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;
    const card = document.createElement('div');
    card.className = 'genre-card';
    card.draggable = isEditMode;
    card.dataset.orderIdx = orderIdx;
    card.innerHTML = `
      <div class="drag-handle">☰</div>
      <div class="genre-icon" style="background:${g.color}20">${icons[realIdx] || '📌'}</div>
      <div class="genre-info">
        <div class="genre-name">${g.name}</div>
        <div class="genre-meta">${answered}/${total}問 完了</div>
        <div class="genre-progress"><div class="genre-progress-bar" style="width:${answered/total*100}%;background:${g.color}"></div></div>
      </div>
      <div class="genre-score" style="color:${g.color}"><span class="genre-score-label">正解率</span>${answered>0?pct+'%':'--'}</div>
    `;
    if(!isEditMode) {
      card.onclick = () => startQuiz(realIdx);
    }

    // ドラッグイベント（PC）
    card.addEventListener('dragstart', e => {
      dragSrcIdx = orderIdx;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if(dragSrcIdx === null || dragSrcIdx === orderIdx) return;
      const newOrder = [...genreOrder];
      const [moved] = newOrder.splice(dragSrcIdx, 1);
      newOrder.splice(orderIdx, 0, moved);
      genreOrder = newOrder;
      saveGenreOrder();
      renderGenreGrid();
    });

    // タッチドラッグ（iPhone対応）
    let touchStartY = 0;
    let touchCard = null;
    card.addEventListener('touchstart', e => {
      if(!isEditMode) return;
      touchStartY = e.touches[0].clientY;
      touchCard = card;
      dragSrcIdx = orderIdx;
    }, {passive:true});
    card.addEventListener('touchmove', e => {
      if(!isEditMode) return;
      e.preventDefault();
      const y = e.touches[0].clientY;
      const cards = [...grid.querySelectorAll('.genre-card')];
      cards.forEach(c => c.classList.remove('drag-over'));
      const target = cards.find(c => {
        const r = c.getBoundingClientRect();
        return y >= r.top && y <= r.bottom;
      });
      if(target && target !== card) target.classList.add('drag-over');
    }, {passive:false});
    card.addEventListener('touchend', e => {
      if(!isEditMode) return;
      const y = e.changedTouches[0].clientY;
      const cards = [...grid.querySelectorAll('.genre-card')];
      cards.forEach(c => c.classList.remove('drag-over'));
      const targetCard = cards.find(c => {
        const r = c.getBoundingClientRect();
        return y >= r.top && y <= r.bottom && c !== card;
      });
      if(targetCard) {
        const destIdx = parseInt(targetCard.dataset.orderIdx);
        if(destIdx !== dragSrcIdx) {
          const newOrder = [...genreOrder];
          const [moved] = newOrder.splice(dragSrcIdx, 1);
          newOrder.splice(destIdx, 0, moved);
          genreOrder = newOrder;
          saveGenreOrder();
          renderGenreGrid();
        }
      }
      dragSrcIdx = null;
    });

    grid.appendChild(card);
  });
}

function saveSession() {
  if(isReviewMode) return;
  const g = GENRES[currentGenreIdx];
  if(!state._session) state._session = {};
  state._session[g.id] = {
    order: currentQuestions.map(q => q.origIdx),
    qIdx: currentQIdx
  };
  saveState();
}

function startQuiz(genreIdx) {
  isReviewMode = false;
  currentGenreIdx = genreIdx;
  const g = GENRES[genreIdx];
  const saved = (state._session || {})[g.id];
  if(saved && saved.qIdx < g.questions.length) {
    currentQuestions = saved.order.map(origIdx => ({...g.questions[origIdx], origIdx}));
    currentQIdx = saved.qIdx;
  } else {
    currentQuestions = g.questions.map((q,i) => ({...q, origIdx: i}));
    if(g.type !== '4choice') {
      for(let i = currentQuestions.length-1; i>0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
      }
    }
    currentQIdx = 0;
  }
  sessionCorrect = 0;
  sessionWrong = 0;
  document.getElementById('quizTitle').textContent = g.name;
  showScreen('quizScreen');
  renderQuestion();
}

function restartToFirst() {
  currentQIdx = 0;
  saveSession();
  document.getElementById('resultOverlay').classList.remove('show');
  renderQuestion();
}

function startReviewQuiz() {
  const revItems = Object.values(getReviewList());
  if(revItems.length === 0) return;
  isReviewMode = true;
  currentGenreIdx = -1;
  currentQuestions = revItems.map((item, i) => ({...item, origIdx: i}));
  // shuffle
  for(let i = currentQuestions.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
  }
  currentQIdx = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  document.getElementById('quizTitle').textContent = '復習問題';
  showScreen('quizScreen');
  renderQuestion();
}

function is4Choice() {
  if(isReviewMode) {
    const q = currentQuestions[currentQIdx];
    return !!q.choices;
  }
  return GENRES[currentGenreIdx] && GENRES[currentGenreIdx].type === '4choice';
}

function getCurrentKey() {
  const q = currentQuestions[currentQIdx];
  if(isReviewMode) return q._revKey || '';
  const g = GENRES[currentGenreIdx];
  return genKey(g.id, q.origIdx);
}

function renderQuestion() {
  const total = currentQuestions.length;
  const q = currentQuestions[currentQIdx];
  const qEl = document.getElementById('questionText');
  const formatted = q.q.replace(/\s*([アイウエオ])\s+/g, '\n$1 ');
  qEl.innerText = formatted;
  document.getElementById('questionNum').textContent = `第 ${currentQIdx+1} 問`;
  document.getElementById('quizCounter').textContent = `${currentQIdx+1}/${total}`;
  document.getElementById('progressBar').style.width = `${(currentQIdx/total)*100}%`;
  document.getElementById('resultOverlay').classList.remove('show');

  if(is4Choice()) {
    document.getElementById('answerBtns').style.display = 'none';
    const cb = document.getElementById('choiceBtns');
    cb.style.display = 'flex';
    cb.innerHTML = '';
    Object.entries(q.choices).forEach(([num, txt]) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = num + '. ' + txt;
      btn.onclick = () => answer4(parseInt(num));
      cb.appendChild(btn);
    });
  } else {
    document.getElementById('answerBtns').style.display = 'flex';
    document.getElementById('choiceBtns').style.display = 'none';
  }
}

function showResultOverlay(correct, q) {
  const badge = document.getElementById('resultBadge');
  const ansText = document.getElementById('resultAnswerText');
  const expl = document.getElementById('resultExplanation');
  const nextBtn = document.getElementById('nextBtn');
  const revBtn = document.getElementById('reviewCheckBtn');

  badge.textContent = correct ? '✓ 正解！' : '✗ 不正解';
  badge.className = 'result-badge ' + (correct ? 'correct' : 'wrong');

  if(is4Choice()) {
    ansText.textContent = `正解: ${q.answer}. ${q.choices[String(q.answer)] || ''}`;
    expl.textContent = q.explanation || '';
    expl.style.display = q.explanation ? 'block' : 'none';
  } else {
    ansText.textContent = `正解: ${q.a ? '○（正しい）' : '×（誤り）'}`;
    expl.textContent = q.e || '';
    expl.style.display = q.e ? 'block' : 'none';
  }

  // 復習ボタン状態
  const rkey = isReviewMode ? (q._revKey||'') : getCurrentKey();
  const inReview = !!(state._review && state._review[rkey]);
  revBtn.textContent = inReview ? '★ 復習リストに追加済み' : '☆ 復習リストに追加';
  revBtn.className = 'review-check-btn' + (inReview ? ' checked' : '');

  const isLast = currentQIdx === currentQuestions.length - 1;
  nextBtn.textContent = isLast ? '結果を見る →' : '次の問題 →';
  document.getElementById('resultOverlay').classList.add('show');
}

function toggleReview() {
  const q = currentQuestions[currentQIdx];
  const g = isReviewMode ? null : GENRES[currentGenreIdx];
  const rkey = isReviewMode ? (q._revKey || '') : genKey(g.id, q.origIdx);
  if(!rkey) return;

  if(!state._review) state._review = {};
  if(state._review[rkey]) {
    delete state._review[rkey];
    document.getElementById('reviewCheckBtn').textContent = '☆ 復習リストに追加';
    document.getElementById('reviewCheckBtn').className = 'review-check-btn';
  } else {
    const item = {
      _revKey: rkey,
      q: q.q,
      a: q.a,
      e: q.e || '',
      choices: q.choices || null,
      answer: q.answer || null,
      explanation: q.explanation || '',
    };
    state._review[rkey] = item;
    document.getElementById('reviewCheckBtn').textContent = '★ 復習リストに追加済み';
    document.getElementById('reviewCheckBtn').className = 'review-check-btn checked';
  }
  saveState();
  updateReviewBadge();
}

function answer4(userAnswer) {
  const q = currentQuestions[currentQIdx];
  const correct = userAnswer === q.answer;
  const btns = document.getElementById('choiceBtns').querySelectorAll('.choice-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    const num = i + 1;
    if(num === q.answer) btn.classList.add('correct');
    else if(num === userAnswer && !correct) btn.classList.add('wrong');
  });

  if(correct) sessionCorrect++; else sessionWrong++;
  if(!isReviewMode) {
    const g = GENRES[currentGenreIdx];
    const key = genKey(g.id, q.origIdx);
    state[key] = correct;
    if(!correct) {
      if(!state._wrong) state._wrong = {};
      state._wrong[key] = {gid: g.id, gname: g.name, q: q.q, a: '選択肢' + q.answer, e: q.choices[String(q.answer)] || ''};
    } else {
      if(state._wrong) delete state._wrong[key];
    }
    saveState();
  }
  showResultOverlay(correct, q);
}

function answer(userAnswer) {
  const q = currentQuestions[currentQIdx];
  const correct = userAnswer === q.a;
  if(correct) sessionCorrect++; else sessionWrong++;

  if(!isReviewMode) {
    const g = GENRES[currentGenreIdx];
    const key = genKey(g.id, q.origIdx);
    state[key] = correct;
    if(!correct) {
      if(!state._wrong) state._wrong = {};
      state._wrong[key] = {gid: g.id, gname: g.name, q: q.q, a: q.a, e: q.e};
    } else {
      if(state._wrong) delete state._wrong[key];
    }
    saveState();
  }
  showResultOverlay(correct, q);
}

function nextQuestion() {
  const isLast = currentQIdx === currentQuestions.length - 1;
  if(isLast) {
    if(!isReviewMode) {
      if(!state._session) state._session = {};
      delete state._session[GENRES[currentGenreIdx].id];
      saveState();
    }
    showResult();
  } else {
    currentQIdx++;
    saveSession();
    renderQuestion();
  }
}

function showResult() {
  const total = currentQuestions.length;
  const pct = Math.round(sessionCorrect / total * 100);
  const name = isReviewMode ? '復習問題' : GENRES[currentGenreIdx].name;
  document.getElementById('finalGenreName').textContent = name;
  document.getElementById('finalPct').textContent = pct + '%';
  document.getElementById('finalCorrect').textContent = sessionCorrect;
  document.getElementById('finalWrong').textContent = sessionWrong;
  document.getElementById('finalTotal').textContent = total;
  showScreen('resultScreen');
}

function retryQuiz() {
  if(isReviewMode) startReviewQuiz();
  else startQuiz(currentGenreIdx);
}

function showWrongList() {
  const list = document.getElementById('wrongList');
  list.innerHTML = '';
  const wrongs = state._wrong || {};
  const items = Object.values(wrongs);
  if(items.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;font-size:15px;">まだ間違えた問題はありません</div>';
  } else {
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'list-item';
      div.innerHTML = `
        <div class="list-item-q">${item.q}</div>
        <div class="list-item-a">正解: ${item.a === true ? '○（正しい）' : item.a === false ? '×（誤り）' : item.a}</div>
        <div class="list-item-e">${item.e}</div>
      `;
      list.appendChild(div);
    });
  }
  showScreen('wrongScreen');
}

function showReviewScreen() {
  const revItems = Object.entries(getReviewList());
  const list = document.getElementById('reviewList');
  const countEl = document.getElementById('reviewCount');
  const startBtn = document.getElementById('reviewStartBtn');
  list.innerHTML = '';

  countEl.textContent = `${revItems.length}問 チェック中`;
  startBtn.style.display = revItems.length > 0 ? 'block' : 'none';

  if(revItems.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;font-size:15px;">復習リストは空です<br><br>問題を解いた後、解説画面の<br>「復習リストに追加」から登録できます</div>';
  } else {
    revItems.forEach(([rkey, item]) => {
      const div = document.createElement('div');
      div.className = 'list-item';
      const ansLabel = item.choices
        ? `正解: ${item.answer}. ${item.choices[String(item.answer)] || ''}`
        : `正解: ${item.a === true ? '○（正しい）' : '×（誤り）'}`;
      const explText = item.explanation || item.e || '';
      div.innerHTML = `
        <button class="review-del-btn" onclick="removeReview('${rkey}')">削除</button>
        <div class="list-item-q">${item.q}</div>
        <div class="list-item-a">${ansLabel}</div>
        ${explText ? `<div class="list-item-e">${explText}</div>` : ''}
      `;
      list.appendChild(div);
    });
  }
  showScreen('reviewScreen');
}

function removeReview(rkey) {
  if(state._review) delete state._review[rkey];
  saveState();
  updateReviewBadge();
  showReviewScreen();
}

function resetAll() {
  if(!confirm('全ての学習記録をリセットしますか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = {};
  updateReviewBadge();
  renderGenreGrid();
}

// ===== 並び替え =====
let genreOrder = loadGenreOrder();
let isEditMode = false;
let dragSrcIdx = null;

function loadGenreOrder() {
  try {
    const saved = JSON.parse(localStorage.getItem('mgr_genre_order'));
    if(saved && saved.length === GENRES.length) return saved;
  } catch(e) {}
  return GENRES.map((_, i) => i);
}

function saveGenreOrder() {
  localStorage.setItem('mgr_genre_order', JSON.stringify(genreOrder));
}

function getOrderedGenres() {
  return genreOrder.map(i => GENRES[i]);
}

function toggleEditMode() {
  isEditMode = !isEditMode;
  document.getElementById('editBtn').style.display = isEditMode ? 'none' : 'block';
  document.getElementById('editDoneBtn').style.display = isEditMode ? 'block' : 'none';
  const grid = document.getElementById('genreGrid');
  if(isEditMode) grid.classList.add('edit-mode');
  else grid.classList.remove('edit-mode');
  renderGenreGrid();
}

// Init
renderGenreGrid();
updateReviewBadge();

if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
